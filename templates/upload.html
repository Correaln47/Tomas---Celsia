<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Rostro Conocido</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }
        .message.success {
            background-color: #dff0d8;
            color: #3c763d;
            border: 1px solid #d6e9c6;
        }
        .message.error {
            background-color: #f2dede;
            color: #a94442;
            border: 1px solid #ebccd1;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <h2>Subir Nueva Cara Conocida</h2>

        {% if message %}
            <div class="message {{ message_type }}">{{ message }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" action="{{ url_for('upload_page') }}">
            <div>
                <label for="name">Nombre de la Persona:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="file">Archivo de Imagen (jpg, png, jpeg):</label>
                <input type="file" id="file" name="file" accept=".jpg, .jpeg, .png" required>
            </div>
            <input type="submit" value="Subir Imagen">
        </form>
        <a href="{{ url_for('index') }}" class="back-link" style="margin-top: 20px; display: inline-block;">&larr; Volver a la Interfaz Principal</a>
    </div>
</body>
</html>
