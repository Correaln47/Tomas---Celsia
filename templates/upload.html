<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Rostro Conocido</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Estilos para los mensajes directamente aquí para asegurar que se apliquen */
        .message-feedback { /* Renombrada la clase para evitar conflictos */
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
        }
        .message-feedback.success {
            background-color: #d4edda; /* Verde pastel */
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message-feedback.error {
            background-color: #f8d7da; /* Rojo pastel */
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .upload-container { /* Asegúrate que esta clase esté definida en style.css o aquí */
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            margin: 30px auto;
            width: 90%;
            max-width: 500px;
            text-align: left;
        }
        .upload-container h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .upload-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .upload-container input[type="text"],
        .upload-container input[type="file"] {
            width: calc(100% - 22px); /* Ajustar padding y border */
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Importante para que el width incluya padding/border */
        }
        .upload-container input[type="submit"] {
            background-color: #007bff; /* Azul primario */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            display: block; /* Para centrarlo o darle width: 100% */
            width: 100%;
            box-sizing: border-box;
        }
        .upload-container input[type="submit"]:hover {
            background-color: #0056b3;
        }
        .back-link {
            display: block; /* Para que ocupe su propia línea y se pueda centrar el texto */
            text-align: center;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="upload-container">
        <h2>Subir Nueva Cara Conocida</h2>

        {% if message %}
            <div class="message-feedback {{ message_type }}">{{ message }}</div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" action="{{ url_for('upload_file') }}">
            <div>
                <label for="name">Nombre de la Persona:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="file">Archivo de Imagen (jpg, png, jpeg):</label>
                <input type="file" id="file" name="file" accept=".jpg, .jpeg, .png" required>
            </div>
            <input type="submit" value="Subir Imagen">
        </form>
        <a href="{{ url_for('index') }}" class="back-link">&larr; Volver a la Interfaz Principal</a>
    </div>
</body>
</html>
